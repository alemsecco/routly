<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROUTLY</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="/assets/logo/4.png" type="image/png">
 
</head>
<body>
  
  <!-- header topo -->
  <header class="topbar">
    <div class="logo">
      <img src="/assets/logo/4.png" alt="logo routly">
    </div>

    <div class="user">
      <span>Nome da Empresa aqui</span>
      <div class="avatar">R</div>
    </div>
  </header>

  <!-- menu lateral -->
  <aside class="sidebar">
    <ul>
      <li class="active"><a href="index.html">Nova rota</a></li>
      <li><a href="/pages/historico.html">Histórico</a></li>
      <li><a href="/pages/frota.html">Frota</a></li>
      <li><a href="/pages/relatorio.html">Relatórios</a></li>
    </ul>
  </aside>

  <!-- conteúdo principal -->
  <main class="content">
    <h1>Nova rota</h1>
    <p class="subtitle">Insira as variáveis e calcule a melhor rota</p>

    <div class="columns">

      <!-- formulário -->
      <form class="form">
        <div class="field">
          <label for="origem">Origem</label>
          <select id="origem">
            <option value="Curitiba" selected>Curitiba</option>
          </select>
        </div>

        <div class="field">
          <label for="destino">Destino</label>
          <select id="destino">
            <option value="">Selecione um destino</option>
            <option value="Paranaguá">Paranaguá</option>
            <option value="Ponta Grossa">Ponta Grossa</option>
            <option value="Londrina">Londrina</option>
            <option value="Maringá">Maringá</option>
          </select>
        </div>

        <div class="field">
          <label for="veiculo">Veículo</label>
          <select id="veiculo">
            <option value="">Selecione um veículo</option>
            <option value="VUC (Urbano)">VUC (Urbano)</option>
            <option value="Caminhão Truck (6x2)">Caminhão Truck (6x2)</option>
            <option value="Carreta LS (3 Eixos)">Carreta LS (3 Eixos)</option>
            <option value="Bi-trem (7 Eixos)">Bi-trem (7 Eixos)</option>
            <option value="Rodo-trem (9 Eixos)">Rodo-trem (9 Eixos)</option>
          </select>
        </div>

        <div class="field">
          <label for="carga">Carga</label>
          <select id="carga">
            <option value="">Selecione uma carga</option>
            <option value="Milho">Milho</option>
            <option value="Soja">Soja</option>
            <option value="Eletro-eletrônicos">Eletro-eletrônicos</option>
            <option value="Carga viva (pequeno porte)">Carga viva (pequeno porte)</option>
            <option value="Carga viva (grande porte)">Carga viva (grande porte)</option>
            <option value="Peças, móveis e máquinas">Peças, móveis e máquinas</option>
            <option value="Outro">Outro</option>
          </select>
        </div>

        <div class="row">
          <div class="field">
            <label for="peso">Peso (em toneladas)</label>
            <input type="text" id="peso" placeholder="Adicione o peso da carga">
          </div>
          <div class="field">
            <label for="preco">Preço diesel</label>
            <input type="text" id="preco" placeholder="Adicione o preço do diesel">
          </div>
        </div>

        <div class="field">
          <label>Prioridade</label>
          <div class="priority">
            <button type="button" class="btn-prioridade ativo" onclick="selecionarPrioridade(this, 'Equilibrado')">Equilibrado</button>
            <button type="button" class="btn-prioridade" onclick="selecionarPrioridade(this, 'Custo')">Custo</button>
            <button type="button" class="btn-prioridade" onclick="selecionarPrioridade(this, 'CO2')">CO₂</button>
          </div>
        </div>

        <button type="submit" class="btn-calcular">CALCULAR ROTA</button>
      </form>

      <!-- resultado -->
      <section class="result">
        <div class="result-header">
          <span class="label">Rota recomendada:</span>
          <span class="badge">MELHOR</span>
        </div>

        <!-- mapa (simbolico) -->
        <div class="map-placeholder">
          <svg id="svg-mapa" viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
            <!-- rota custo -->
            <path id="rota-Custo" d="M 60 100 L 150 80 L 250 120 L 340 100" class="rota-linha" />
            <!-- rota CO2 -->
            <path id="rota-CO2" d="M 60 100 Q 200 20 340 100" class="rota-linha" />
            <!-- rota equilibrada -->
            <path id="rota-Equilibrado" d="M 60 100 Q 200 180 340 100" class="rota-linha rota-ativa" />
            <!-- cidades (pontos) -->
            <circle cx="60" cy="100" r="7" class="cidade-ponto" />
            <circle cx="340" cy="100" r="7" class="cidade-ponto" />
            <!-- cidades (texto) -->
            <text x="60" y="130" id="mapa-texto-origem" class="cidade-texto">Curitiba</text>
            <text x="340" y="130" id="mapa-texto-destino" class="cidade-texto">Destino</text>
          </svg>
        </div>


        <!-- métricas -->
        <div class="metrics">
          <div class="metric dark">
            <span class="metric-label">Custo total</span>
            <span class="metric-value" id="valor-custo">—</span>
            <span class="metric-sub" id="sub-custo"></span>
          </div>
          <div class="metric">
            <span class="metric-label">Tempo estimado</span>
            <span class="metric-value" id="valor-tempo">—</span>
            <span class="metric-sub" id="sub-tempo"></span>
          </div>
          <div class="metric">
            <span class="metric-label">Emissão CO₂</span>
            <span class="metric-value" id="valor-co2">—</span>
            <span class="metric-sub" id="sub-co2"></span>
          </div>
          <div class="metric dark">
            <span class="metric-label">Combustível</span>
            <span class="metric-value" id="valor-combustivel">—</span>
            <span class="metric-sub" id="sub-combustivel"></span>
          </div>
        </div>
      </section>

    </div>
  </main>

  <script src="index.js"></script>
</body>
</html>
